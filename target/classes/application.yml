spring:
  profiles:
    active: dev
  application:
    name: work-pulse
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/work_pulse}
    username: ${DB_USERNAME:work_pulse}
    password: ${DB_PASSWORD:work_pulse}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: ${SERVER_PORT:8080}

app:
  security:
    jwt:
      issuer: work-pulse
      secret: ${JWT_SECRET:work-pulse-dev-secret-change-me-min-32-chars}
      access-token-ttl-minutes: 15
      refresh-token-ttl-days: 7
    token-blacklist:
      backend: ${TOKEN_BLACKLIST_BACKEND:memory}
      cleanup-ms: 300000
  device-events:
    processor:
      batch-size: ${DEVICE_PROCESSOR_BATCH_SIZE:100}
      max-retry: 3
      fixed-delay-ms: ${DEVICE_PROCESSOR_INTERVAL_MS:60000}
  device:
    polling:
      interval-ms: 60000
    alert-stream:
      interval-ms: 15000
    hikvision:
      connection-timeout-ms: 5000
      read-timeout-ms: 10000
  reports:
    snapshot-cron: ${REPORT_SNAPSHOT_CRON:0 0 1 * * *}
  uploads:
    photo-dir: ${UPLOAD_PHOTO_DIR:uploads/photos}
  face:
    service-url: ${FACE_SERVICE_URL:http://localhost:5001}
    threshold: ${FACE_THRESHOLD:0.45}
    max-location-accuracy-meters: ${MAX_LOCATION_ACCURACY_METERS:100}
  file-storage:
    upload-dir: ${UPLOAD_DIR:uploads}
    public-base-url: ${PUBLIC_FILE_BASE_URL:/uploads}
